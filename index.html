<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Clicker</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            overflow: hidden;
            background: #2d2d2d;
        }

        #game-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            margin: auto;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>

<body>
    <div id="game-container"></div>

    <script type="module" src="./main.js"></script>
</body>
</html>
